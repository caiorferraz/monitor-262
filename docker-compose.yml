services:
  nginx-service:
  # Essa imagem veio da internet
    image: nginx:alpine
    container_name: "nginx-container"
    networks:
      - internal-net
    ports:
      - "80:80"
    environment:
      - TZ=America/Sao_Paulo
    volumes:
        # "Injeta" seu HTML no servidor pronto
      - ./monitor-262/interface:/usr/share/nginx/html/monitor-262
      - ./afinador/interface:/usr/share/nginx/html/afinador
      # Configuração do Servidor
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - monitor-service
      - audio-service
      # Limita logs também para o servidor web (Nginx)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  # O Cérebro do Monitoramento
  monitor-service:
    build: ./monitor-262/api
    # Construída pela linha acima
    image: monitor-img:latest
    container_name: "monitor-container"
    networks:
      - internal-net
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=America/Sao_Paulo
    volumes:
      - ./monitor-262/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --no-access-log
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  # O Cérebro do Afinador
  audio-service:
    build: ./afinador/api
    image: audio-img:latest
    container_name: "audio-container"
    networks:
      - internal-net
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=America/Sao_Paulo
    ports:
      - "12345:12345/udp"
      # Porta 8001 removida (acesso via Nginx)
    volumes:
      - ./afinador/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

networks:
  internal-net:
    driver: bridge