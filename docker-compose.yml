# ==============================================================================
# PROJETO: SISTEMA DE MONITORAMENTO DE ATIVOS 262
# ==============================================================================
# DESCRIÇÃO ENXUTA:
# Sistema isolado via Docker com script Python de alta performance para 
# monitoramento paralelo de 8 dispositivos. Dados expostos via API e 
# visualizados em Painel Web (Nginx) com auto-update de 2s e fuso horário SP.
#
# DESCRIÇÃO DETALHADA:
# 1. CAMADA API (PYTHON): Pings paralelos em 8 ativos (5 pacotes cada). 
#    Uso de PYTHONUNBUFFERED=1 para logs instantâneos no terminal.
# 2. CAMADA WEB (NGINX): Servidor leve entregando HTML com visualização 
#    vertical (<pre>) e atualização automática via JavaScript (setInterval).
# 3. CAMADA INFRA (DOCKER): Sincronização de relógio via /etc/localtime e TZ.
#    Volumes mapeados para edição de código em tempo real (Hot-Reload).
# ==============================================================================

version: '3.8'

services:
  # O Cérebro
  api-monitor:
    build: ./api
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=America/Sao_Paulo
    ports:
      - "8000:8000"
    volumes:
      - /etc/localtime:/etc/localtime:ro

  # A Cara do Sistema (Peça pronta do Lego)
  painel-web:
    image: nginx:alpine
    ports:
      - "80:80"
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - ./interface:/usr/share/nginx/html # "Injeta" seu HTML no servidor pronto
      - /etc/localtime:/etc/localtime:ro
