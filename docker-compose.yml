# ==============================================================================
# PROJETO: SISTEMA DE MONITORAMENTO DE ATIVOS 262
# ==============================================================================
# DESCRIÇÃO ENXUTA:
# Sistema isolado via Docker com script Python de alta performance para 
# monitoramento paralelo de 8 dispositivos. Dados expostos via API e 
# visualizados em Painel Web (Nginx) com auto-update de 2s e fuso horário SP.
# ==============================================================================
services:
  # O Cérebro
  api-monitor:
    build: ./api
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=America/Sao_Paulo
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - /etc/localtime:/etc/localtime:ro
    # Adicionada a flag --no-access-log para limpar o terminal
    command: 
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload --no-access-log
    # Limita o crescimento dos arquivos de log no disco
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # A Cara do Sistema (Peça pronta do Lego)
  painel-web:
    image: nginx:alpine
    ports:
      - "80:80"
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - ./interface:/usr/share/nginx/html  # "Injeta" seu HTML no servidor pronto
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - api-monitor
    # Limita logs também para o servidor web (Nginx)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"