<!DOCTYPE html>
<html>
<body>
    <h1>Monitoramento 262</h1>
    
    <div id="lista-dispositivos">Carregando...</div>

    <script>
        function atualizar() {
            const ipServidor = window.location.hostname;
      
            fetch(`http://${ipServidor}:8000/status`)
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('lista-dispositivos');
                    let htmlColetado = '';

                    Object.entries(data).forEach(([ip, info]) => {
                        
                        // LÓGICA DE BUSCA:
                        // Transformamos o conteúdo do dispositivo em texto
                        const textoBruto = JSON.stringify(info).toLowerCase();
                        
                        // Se a palavra "online" aparecer em qualquer lugar do texto, fica verde
                        const cor = textoBruto.includes("online") ? 'green' : 'red';

                        htmlColetado += `
                            <div style="margin-bottom: 10px; color: ${cor}; font-family: monospace;">
                                <strong>Dispositivo:</strong> ${ip} | 
                                <span>${JSON.stringify(info)}</span>
                            </div>
                        `;
                    });

                    container.innerHTML = htmlColetado;
                });
        }

        atualizar(); 
        setInterval(atualizar, 1000); 
    </script>
</body>
</html>
