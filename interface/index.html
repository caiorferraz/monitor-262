<!DOCTYPE html>
<html>
<body>
    <h1>Monitoramento 262</h1>
    
    <div id="lista-dispositivos">Carregando...</div>

    <script>
        function atualizar() {
            const ipServidor = window.location.hostname;
      
            fetch(`http://${ipServidor}:8000/status`)
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('lista-dispositivos');
                    let htmlColetado = '';

                    Object.entries(data).forEach(([ip, info]) => {
                        
                        // Pegamos o texto bruto igualzinho o anterior que funcionou
                        const textoBruto = JSON.stringify(info);
                        const cor = textoBruto.toLowerCase().includes("online") ? 'green' : 'red';

                        // Lógica "Inquebrável": 
                        // Se houver qualquer número no texto, ele tenta mostrar. 
                        // Se não, ele apenas repete o que está no info.
                        htmlColetado += `
                            <div style="margin-bottom: 10px; color: ${cor}; font-family: monospace;">
                                <strong>Dispositivo:</strong> ${ip} | 
                                <span>${textoBruto}</span>
                            </div>
                        `;
                    });

                    container.innerHTML = htmlColetado;
                })
                .catch(err => console.log("Aguardando API..."));
        }

        atualizar(); 
        setInterval(atualizar, 1000); 
    </script>
</body>
</html>
