server {
    listen 80;

    # O usuário agora SÓ acessa os cards via localhost/ping
    # Se ele digitar apenas 'localhost', o Nginx dará erro 404 (Não Encontrado)
    location /ping {
        alias /usr/share/nginx/html/;
        index index.html;
    }

    # A API continua aqui para o JavaScript buscar os dados internamente
    location /status {
        proxy_pass http://api-monitor:8000/status;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}